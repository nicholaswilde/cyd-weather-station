---
version: '3'

tasks:
  screenshots:
      desc: Capture all screenshots from the ESP32 CYD board
      dotenv: ['.env']
      preconditions:
        - sh: 'test -n "$CYD_DEVICE_IP"'
          msg: "CYD_DEVICE_IP is not set. Please add it to your .env file."
      cmds:
        - bash ./scripts/capture-screenshots.sh $CYD_DEVICE_IP
  eau:
    desc: Erase and upload
    cmds:
      - pio run -t erase -t upload

  uam:
    desc: Upload and monitor
    cmds:
      - pio run -t upload -t monitor
  init:
    desc: Initialize the project
    preconditions:
      - test -f config/secrets.h.example
    cmds:
      - cp config/secrets.h.example config/secrets.h

  build:
    desc: Build the firmware
    cmds:
      - pio run

  upload:
    desc: Upload the firmware to the ESP32 CYD board
    cmds:
      - pio run --target upload

  monitor:
    desc: Start the serial monitor
    cmds:
      - pio device monitor

  test:
    desc: Run unit tests
    cmds:
      - pio test -e native

  check:
    desc: Run static code analysis / linting
    cmds:
      - pio check

  clean:
    desc: Clean build files
    cmds:
      - pio run --target clean

  erase:
    desc: Erase the ESP32 flash memory (clears all saved settings)
    cmds:
      - pio run --target erase

  setup:node:
    desc: Install Node.js dependencies for font generation
    cmds:
      - npm install

  font:generate:
    desc: Generate custom weather icon font from TTF source
    deps: [setup:node]
    cmds:
      - npm run font:generate
      - npm run font:generate:24

  default:
    cmds:
      - task -l
    silent: true
