[platformio]
default_envs = esp32dev
test_dir = tests

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
check_skip_packages = yes
board_build.partitions = min_spiffs.csv
check_src_filters =
    +<src/>
    +<include/>
check_flags =
    cppcheck: --suppress=*:*/.pio/*
    cppcheck: --suppress=unmatchedSuppression

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    lvgl/lvgl@^8.3.11
    bblanchon/ArduinoJson@^6.21.3
    me-no-dev/AsyncTCP@^1.1.1
    marvinroger/AsyncMqttClient@^0.9.0
    
build_flags =
    ; -D CORE_DEBUG_LEVEL=0
    -D USER_SETUP_LOADED=1
    -D USE_HSPI_PORT=1
    -D ILI9341_DRIVER=1
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000
    -D LOAD_GLCD=0
    -D LOAD_FONT2=0
    -D LOAD_FONT4=0
    -D LOAD_FONT6=0
    -D LOAD_FONT7=0
    -D LOAD_FONT8=0
    -D LOAD_GFXFF=0
    -D SMOOTH_FONT=0
    -D LV_CONF_INCLUDE_SIMPLE=1
    -D LVGL_VERSION_MAJOR=8
    -D LVGL_VERSION_MINOR=4
    -D XPT2046_CS=33
    -D XPT2046_IRQ=36
    -D XPT2046_MOSI=32
    -D XPT2046_MISO=39
    -D XPT2046_CLK=25
    -D TOUCH_CS=-1
    -I include/
    -I .

[env:native]
platform = native
lib_deps =
    bblanchon/ArduinoJson@^6.21.3
build_flags =
    -D NATIVE_TEST=1
    -D LVGL_VERSION_MAJOR=8
    -D LVGL_VERSION_MINOR=4
    -I include/
    -I tests/mocks/
    -I .
; Add your source files here so the linker can find them:
build_src_filter = 
    +<../src/mqtt_manager.cpp>
