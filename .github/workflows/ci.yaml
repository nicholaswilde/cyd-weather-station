---
name: PlatformIO CI
on:  # yamllint disable-line rule:truthy
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        env:
          - esp32dev
    runs-on: ubuntu-latest

    steps:
      - name: "Create filename"
        run: |
          VAR="cy-weather-station-${{ github.ref_name }}-${{ matrix.env }}"
          echo "BASENAME=${VAR,,}" >> $GITHUB_ENV

      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: "Cache pip"
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: "Cache PlatformIO Core"
        uses: actions/cache@v4
        with:
          path: ~/.platformio/packages
          key: ${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "Install PlatformIO Core"
        run: pip install --upgrade platformio

      - name: "Copy secrets"
        run: cp config/secrets.h.example config/secrets.h

      - name: "Build PlatformIO Project ${{ matrix.env }}"
        run: pio run --environment ${{ matrix.env }}

      - name: "Zip binaries"
        run: zip -j ${{ env.BASENAME }}.zip .pio/build/${{ matrix.env }}/*.bin

      - name: Debug Environment Variable
        run: |
          echo "The BASENAME variable is: ${{ env.BASENAME }}"
          echo "As a shell variable: $BASENAME"
          ls -la
        
